<style>

            border-color: theme('colors.accent-cyan');
            background-color: theme('colors.surface-container');
        }
        .option-card.selected .icon-glow {
            color: theme('colors.accent-cyan');
        }
        .option-card.selected::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: theme('borderRadius.lg');

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-accent-cyan/30">
<!-- Ambient Glow Backgrounds -->
<div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[1000px] h-full pointer-events-none z-0">
<div class="absolute top-[10%] left-[10%] w-[400px] h-[400px] bg-accent-violet/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[20%] right-[10%] w-[300px] h-[300px] bg-accent-cyan/10 rounded-full blur-[100px]"></div>
</div>
<!-- Main Canvas Content (z-index ensures it sits above glows) -->
<main class="relative z-10 flex-grow flex flex-col px-margin-mobile md:px-margin-desktop w-full max-w-[1280px] mx-auto pb-xl">
<!-- Top Progress Header -->
<header class="w-full pt-sm md:pt-xl mb-xl">
<div class="flex justify-between items-center mb-xs">
<span class="font-display text-label-sm text-on-surface-variant uppercase tracking-wider">Paso 2</span>
<span class="font-display text-label-sm text-on-surface-variant">2 de 5</span>
</div>
<!-- Progress Bar Track -->
<div class="w-full h-[4px] bg-surface-container-highest rounded-full overflow-hidden">
<!-- Progress Bar Fill -->
<div class="h-full bg-accent-cyan rounded-full transition-all duration-700 ease-in-out" style="width: 40%;"></div>
</div>
</header>
<!-- Quiz Question Area -->
<div class="flex-grow flex flex-col justify-center max-w-[800px] mx-auto w-full">
<div class="text-center mb-xl">
<h1 class="font-display text-headline-lg-mobile md:text-headline-lg text-primary">
                    ¿Cómo calificarías tu presencia actual en canales pagados (Meta, Google Ads)?
                </h1>
<p class="mt-4 font-body-lg text-on-surface-variant max-w-[600px] mx-auto">
                    Selecciona la opción que mejor describa la madurez de tus campañas actuales.
                </p>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full">
<!-- Option 1: Inexistente -->
<button class="option-card relative flex flex-col items-start p-md bg-surface border border-surface-border rounded-lg text-left transition-all duration-300 hover:bg-surface-container hover:border-surface-tint group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-sm group-hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined icon-glow text-[28px] text-on-surface-variant group-hover:text-primary transition-colors">block</span>
</div>
<h3 class="font-display text-headline-sm text-primary mb-2">Inexistente</h3>
<p class="font-body-md text-on-surface-variant">No tenemos campañas activas o nunca hemos invertido en pauta publicitaria.</p>
</button>
<!-- Option 2: Básica -->
<button class="option-card relative flex flex-col items-start p-md bg-surface border border-surface-border rounded-lg text-left transition-all duration-300 hover:bg-surface-container hover:border-surface-tint group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-sm group-hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined icon-glow text-[28px] text-on-surface-variant group-hover:text-primary transition-colors">signal_cellular_1_bar</span>
</div>
<h3 class="font-display text-headline-sm text-primary mb-2">Básica</h3>
<p class="font-body-md text-on-surface-variant">Inversión esporádica, campañas configuradas manualmente sin seguimiento avanzado.</p>
</button>
<!-- Option 3: Intermedia -->
<button class="option-card relative flex flex-col items-start p-md bg-surface border border-surface-border rounded-lg text-left transition-all duration-300 hover:bg-surface-container hover:border-surface-tint group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-sm group-hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined icon-glow text-[28px] text-on-surface-variant group-hover:text-primary transition-colors">signal_cellular_3_bar</span>
</div>
<h3 class="font-display text-headline-sm text-primary mb-2">Intermedia</h3>
<p class="font-body-md text-on-surface-variant">Campañas activas constantes, uso de conversiones básicas y segmentación definida.</p>
</button>
<!-- Option 4: Avanzada -->
<button class="option-card relative flex flex-col items-start p-md bg-surface border border-surface-border rounded-lg text-left transition-all duration-300 hover:bg-surface-container hover:border-surface-tint group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-sm group-hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined icon-glow text-[28px] text-on-surface-variant group-hover:text-primary transition-colors">rocket_launch</span>
</div>
<h3 class="font-display text-headline-sm text-primary mb-2">Avanzada</h3>
<p class="font-body-md text-on-surface-variant">Ecosistema full-funnel, automatización, integraciones CRM y atribución multicanal.</p>
</button>

<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Anterior
            </button>
<button class="h-[54px] px-8 bg-primary text-background rounded-full font-display text-label-lg hover:bg-primary-fixed-dim transition-colors flex items-center gap-2 active:scale-[0.98]">
                Siguiente
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</main>
<script>
        // Simple interaction script to handle option selection
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.option-card');
            
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Remove selected class from all
                    cards.forEach(c => c.classList.remove('selected'));
                    // Add to clicked
                    card.classList.add('selected');
                });
            });
        });
    </script>
